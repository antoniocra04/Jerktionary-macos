name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Package macOS
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: swift test

      - name: Build app bundle
        run: ./scripts/make-app.sh release

      - name: Package DMG and ZIP
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            APP_VERSION="${GITHUB_REF_NAME#v}"
          else
            APP_VERSION="dev-${GITHUB_SHA::7}"
          fi
          ditto -c -k --sequesterRsrc --keepParent dist/Jerktionary.app "dist/Jerktionary-${APP_VERSION}-mac-arm64.zip"
          hdiutil create -volname "Jerktionary" -srcfolder dist/Jerktionary.app -ov -format UDZO "dist/Jerktionary-${APP_VERSION}-mac-arm64.dmg"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jerktionary-macos
          path: |
            dist/*.dmg
            dist/*.zip

      - name: Attach files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.zip
